<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject}">Message from Blinx AI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
        }

        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #000000;
            padding-bottom: 40px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            margin-top: 40px;
            overflow: hidden;
        }

        .header {
            padding: 40px 40px 20px 40px;
            text-align: left;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .content {
            padding: 0 40px 40px 40px;
            line-height: 1.7;
            font-size: 16px;
            color: #d4d4d4;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 24px;
            border-bottom: 1px solid #262626;
            padding-bottom: 16px;
        }

        .footer {
            padding: 30px 40px;
            background-color: #050505;
            border-top: 1px solid #1a1a1a;
            text-align: left;
        }

        .footer-text {
            font-size: 12px;
            color: #525252;
            margin-bottom: 8px;
        }

        .highlight {
            color: #3b82f6;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <div class="logo">Blinx<span class="highlight">AI</span></div>
            </div>
            <div class="content">
                <h1 th:text="${subject}">Notification</h1>
                <div th:utext="${body}">
                    This is the body of the email.
                </div>
            </div>
            <div class="footer">
                <div class="footer-text">
                    This email was sent from <span class="highlight">Blinx AI Assistant</span>.
                </div>
                <div class="footer-text">
                    For any inquiries, please contact <a href="mailto:support@blinxai.me"
                        style="color: #3b82f6;">support@blinxai.me</a>
                </div>
                <div class="footer-text" style="margin-top: 15px;">
                    © 2026 Blinx AI. All rights reserved.
                </div>
            </div>
        </div>
    </div>
</body>

</html>
