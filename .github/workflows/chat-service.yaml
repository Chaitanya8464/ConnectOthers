name: BlinxAI Chat Service

on:
  push:
    branches: [main]
    paths:
      - "chat-service/**"
      - "Dockerfile.chat-service"
      - "Dockerfile.chat-service.ci"
      - "entrypoint.sh"
      - ".github/workflows/chat-service.yaml"
  pull_request:
    branches: [main]
    paths:
      - "chat-service/**"
      - "Dockerfile.chat-service"
      - ".github/workflows/chat-service.yaml"

concurrency:
  group: chat-service-deploy
  cancel-in-progress: true

env:
  IMAGE_REPO: raajkr07
  IMAGE_NAME: blinx-chat-service
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          cache-dependency-path: chat-service/pom.xml

      - name: Build & Test
        working-directory: chat-service
        run: mvn -B -T 1C verify

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare Docker context
        run: |
          mkdir -p docker-ctx
          cp chat-service/target/*.jar docker-ctx/app.jar
          cp entrypoint.sh docker-ctx/entrypoint.sh
          cp Dockerfile.chat-service.ci docker-ctx/Dockerfile

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: docker-ctx
          file: docker-ctx/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_REPO }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GCE (Doppler + Datadog)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: SSH and Synchronized Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_INSTANCE_IP }}
          username: ${{ secrets.GCE_VM_USER }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              IMAGE_PATH="${{ env.IMAGE_REPO }}/${{ env.IMAGE_NAME }}:latest"
              
              echo "📦 Pulling latest image from Docker Hub..."
              docker pull $IMAGE_PATH
              
              echo "🛑 Stopping existing blinxai-api container..."
              docker stop blinxai-api || true
              docker rm blinxai-api || true
              
              echo "📊 Ensuring Datadog agent is running with host networking..."
              if ! docker ps --format '{{.Names}}' | grep -q "datadog-agent"; then
                echo "🚀 Starting Datadog agent..."
                docker run -d --name datadog-agent \
                  --restart unless-stopped \
                  --network host \
                  -v /var/run/docker.sock:/var/run/docker.sock:ro \
                  -v /proc/:/host/proc/:ro \
                  -v /sys/fs/cgroup/:/host/sys/fs/cgroup/:ro \
                  -v /opt/datadog-agent/run:/opt/datadog-agent/run:rw \
                  -e DD_API_KEY=$(doppler secrets get DD_API_KEY --plain) \
                  -e DD_SITE=us5.datadoghq.com \
                  gcr.io/datadoghq/agent:7
              fi

              echo "🚀 Starting new blinxai-api (Doppler + Datadog)..."
              docker run -d \
                --name blinxai-api \
                --restart unless-stopped \
                --network host \
                --memory=4g \
                --memory-swap=4g \
                --label com.datadoghq.ad.logs="[{\"source\":\"java\",\"service\":\"blinx-chat-service\",\"log_processing_rules\":[{\"type\":\"multi_line\",\"name\":\"java_stacktrace\",\"pattern\":\"\\\\s+(at |Caused by|\\\\.\\\\.\\\\.)\"}]}]" \
                --env-file <(doppler secrets download --no-file --format env | sed '\''s/="\(.*\)"$/=\1/'\'') \
                -e DD_AGENT_HOST=127.0.0.1 \
                -e DD_TRACE_AGENT_PORT=8126 \
                -e DD_DOGSTATSD_PORT=8125 \
                -e DD_SITE=us5.datadoghq.com \
                $IMAGE_PATH
              
              echo "🧹 Pruning old image layers..."
              docker image prune -f
              
              echo "✅ Deployment complete!"
              docker ps | grep -E "blinxai-api|datadog-agent"
            '

      - name: Health check
        run: |
          echo "Verifying API health..."
          sleep 40
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.blinxai.me/actuator/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✓ API is HEALTHY (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 20s..."
            sleep 20
          done
          echo "⚠ Health check failed. Please check: docker logs blinxai-api"
          exit 1
